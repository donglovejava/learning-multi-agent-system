# 一键部署编排（§8.2）。
# 启动：docker compose up -d
# 后端依赖 5 个存储/中间件服务，均含健康检查，backend 等其就绪后启动。

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:pass@db:5432/learning_db
      - REDIS_URL=redis://redis:6379/0
      - MILVUS_HOST=milvus
      - NEO4J_URI=bolt://neo4j:7687
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      neo4j:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: learning_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docs/sql/init_schema.sql:/docker-entrypoint-initdb.d/init_schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d learning_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  milvus:
    image: milvusdb/milvus:v2.3.0
    command: ["milvus", "run", "standalone"]
    ports:
      - "19530:19530"
    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: local

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password

  rabbitmq:
    image: rabbitmq:3.12-management
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_data:
